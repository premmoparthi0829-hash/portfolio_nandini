<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel | Nandini Vaddepalli</title>
    
    <!--==================== UNICONS ====================-->
    <link rel="stylesheet" href="https://unicons.iconscout.com/release/v4.0.0/css/line.css">
    
    <!--==================== GOOGLE FONTS ====================-->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!--==================== CSS ====================-->
    <link rel="stylesheet" href="assets/css/admin.css">

    <!--==================== FIREBASE SDK ====================-->
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-storage-compat.js"></script>
    <script src="assets/js/firebase-config.js"></script>
</head>
<body>
    <!-- Custom Cursor -->
    <div class="cursor-dot" data-cursor-dot></div>
    <div class="cursor-outline" data-cursor-outline></div>

    <!-- Premium Rich Aurora Decoration -->
    <svg class="rich-decoration" width="100%" height="100%" xmlns="http://www.w3.org/2000/svg" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; pointer-events: none; overflow: hidden; opacity: 0.6;">
        <style>
            @keyframes aurora1 {
                0%, 100% { transform: translate(0, 0) scale(1); }
                33% { transform: translate(5vw, -50px) scale(1.1); }
                66% { transform: translate(-3vw, 30px) scale(0.9); }
            }
            @keyframes aurora2 {
                0%, 100% { transform: translate(0, 0) scale(1); }
                33% { transform: translate(-4vw, 40px) scale(0.9); }
                66% { transform: translate(4vw, -20px) scale(1.1); }
            }
            @keyframes aurora3 {
                0%, 100% { transform: translate(0, 0) scale(1); }
                33% { transform: translate(3vw, 20px) scale(1.05); }
                66% { transform: translate(-2vw, -40px) scale(0.95); }
            }
            .orb-1 { animation: aurora1 20s ease-in-out infinite; transform-origin: center; }
            .orb-2 { animation: aurora2 25s ease-in-out infinite; transform-origin: center; }
            .orb-3 { animation: aurora3 22s ease-in-out infinite reverse; transform-origin: center; }
        </style>
        <defs>
            <filter id="premium-blur" x="-50%" y="-50%" width="200%" height="200%">
                <feGaussianBlur in="SourceGraphic" stdDeviation="80" />
            </filter>
            <radialGradient id="grad-purple" cx="50%" cy="50%" r="50%">
                <stop offset="0%" stop-color="#8338EC" stop-opacity="0.4"/>
                <stop offset="100%" stop-color="#8338EC" stop-opacity="0"/>
            </radialGradient>
            <radialGradient id="grad-pink" cx="50%" cy="50%" r="50%">
                <stop offset="0%" stop-color="#FF006E" stop-opacity="0.3"/>
                <stop offset="100%" stop-color="#FF006E" stop-opacity="0"/>
            </radialGradient>
            <radialGradient id="grad-gold" cx="50%" cy="50%" r="50%">
                <stop offset="0%" stop-color="#FFBE0B" stop-opacity="0.3"/>
                <stop offset="100%" stop-color="#FFBE0B" stop-opacity="0"/>
            </radialGradient>
        </defs>
        <g filter="url(#premium-blur)">
            <circle class="orb-1" cx="20%" cy="20%" r="400" fill="url(#grad-purple)"/>
            <circle class="orb-2" cx="80%" cy="80%" r="500" fill="url(#grad-pink)"/>
            <circle class="orb-3" cx="50%" cy="50%" r="300" fill="url(#grad-gold)"/>
        </g>
    </svg>

    <!--==================== LOGIN SECTION ====================-->
    <section id="login-section">
        <div class="login__container">
            <h1 class="login__title">Admin Panel</h1>
            <input type="email" id="email" class="login__input" placeholder="Email">
            <input type="password" id="password" class="login__input" placeholder="Password">
            <button id="login-btn" class="login__button">Secure Login</button>
            <button id="demo-btn" class="login__button" style="margin-top: 1.25rem; background: transparent; border: 1px solid var(--first-color); color: var(--first-color);">Access Demo Mode</button>
            <p id="login-error" style="color: #FF006E; margin-top: 1.5rem; font-size: 0.9rem; font-weight: 500;"></p>
        </div>
    </section>

    <!--==================== DASHBOARD SECTION ====================-->
    <section id="admin-dashboard">
        <div class="admin__layout">
            <!-- Sidebar -->
            <aside class="sidebar">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
                    <div class="sidebar__logo" style="margin-bottom: 0;">NANDINI V.</div>
                    <i class="uil uil-moon change-theme" id="theme-button" style="cursor: pointer; font-size: 1.25rem; color: var(--title-color);"></i>
                </div>
                <div class="sidebar__menu">
                    <div class="sidebar__item active" data-panel="home-panel">
                        <i class="uil uil-estate"></i> Home
                    </div>
                    <div class="sidebar__item" data-panel="about-panel">
                        <i class="uil uil-user"></i> About
                    </div>
                    <div class="sidebar__item" data-panel="skills-panel">
                        <i class="uil uil-file-alt"></i> Skills
                    </div>
                    <div class="sidebar__item" data-panel="experience-panel">
                        <i class="uil uil-briefcase-alt"></i> Experience
                    </div>
                    <div class="sidebar__item" data-panel="portfolio-panel">
                        <i class="uil uil-scenery"></i> Portfolio
                    </div>
                    <div class="sidebar__item" data-panel="contact-panel">
                        <i class="uil uil-message"></i> Contact
                    </div>
                </div>
                <div style="margin-top: auto;">
                    <button id="logout-btn" class="btn btn-outline" style="width: 100%;">
                        <i class="uil uil-sign-out-alt"></i> Logout
                    </button>
                </div>
            </aside>

            <!-- Main Content -->
            <main class="main-content">
                
                <!-- Home Panel -->
                <div class="section-panel active" id="home-panel">
                    <h2 class="header__title">Home Section</h2>
                    <form id="home-form">
                        <div class="form__group">
                            <label class="form__label">Title</label>
                            <input type="text" name="title" class="form__input" placeholder="Hi, I'm ...">
                        </div>
                        <div class="form__group">
                            <label class="form__label">Subtitle</label>
                            <input type="text" name="subtitle" class="form__input" placeholder="Senior Graphic Designer">
                        </div>
                        <div class="form__group">
                            <label class="form__label">Description</label>
                            <textarea name="description" class="form__textarea"></textarea>
                        </div>
                        <button type="submit" class="btn btn-primary">
                            Update Home <i class="uil uil-check-circle"></i>
                        </button>
                    </form>
                </div>

                <!-- About Panel -->
                <div class="section-panel" id="about-panel">
                    <h2 class="header__title">About Section</h2>
                    <form id="about-form">
                        <div class="form__group">
                            <label class="form__label">Description</label>
                            <textarea name="description" class="form__textarea"></textarea>
                        </div>
                        <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 1.5rem;">
                            <div class="form__group">
                                <label class="form__label">Experience (Years)</label>
                                <input type="text" name="exp_years" class="form__input">
                            </div>
                            <div class="form__group">
                                <label class="form__label">Projects Completed</label>
                                <input type="text" name="projects_count" class="form__input">
                            </div>
                            <div class="form__group">
                                <label class="form__label">Companies Worked</label>
                                <input type="text" name="companies_count" class="form__input">
                            </div>
                        </div>
                        <button type="submit" class="btn btn-primary">
                            Update About <i class="uil uil-check-circle"></i>
                        </button>
                    </form>
                </div>

                <!-- Skills Panel -->
                <div class="section-panel" id="skills-panel">
                    <h2 class="header__title">Skills & Tools</h2>
                    <div id="skills-list" class="item-list"></div>
                    <button class="btn btn-outline" onclick="openModal('skill')">
                        <i class="uil uil-plus"></i> Add New Skill
                    </button>
                </div>

                <!-- Experience Panel -->
                <div class="section-panel" id="experience-panel">
                    <h2 class="header__title">Experience & Education</h2>
                    
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 3rem;">
                        <div>
                            <h3 style="margin-bottom: 1.5rem; color: var(--first-color);">Work Experience</h3>
                            <div id="exp-work-list" class="item-list"></div>
                            <button class="btn btn-outline btn-small" onclick="openModal('experience', 'work')">
                                <i class="uil uil-plus"></i> Add Work
                            </button>
                        </div>

                        <div>
                            <h3 style="margin-bottom: 1.5rem; color: var(--first-color);">Education</h3>
                            <div id="exp-edu-list" class="item-list"></div>
                            <button class="btn btn-outline btn-small" onclick="openModal('experience', 'edu')">
                                <i class="uil uil-plus"></i> Add Education
                            </button>
                        </div>
                    </div>
                </div>

                <!-- Portfolio Panel -->
                <div class="section-panel" id="portfolio-panel">
                    <h2 class="header__title">Portfolio Projects</h2>
                    <div id="portfolio-list" class="item-list"></div>
                    <button class="btn btn-outline" onclick="openModal('portfolio')">
                        <i class="uil uil-plus"></i> Add New Project
                    </button>
                </div>

                <!-- Contact Panel -->
                <div class="section-panel" id="contact-panel">
                    <h2 class="header__title">Contact Information</h2>
                    <form id="contact-form">
                        <div class="form__group">
                            <label class="form__label">Phone</label>
                            <input type="text" name="phone" class="form__input">
                        </div>
                        <div class="form__group">
                            <label class="form__label">Email</label>
                            <input type="email" name="email" class="form__input">
                        </div>
                        <div class="form__group">
                            <label class="form__label">Location</label>
                            <input type="text" name="location" class="form__input">
                        </div>
                        <button type="submit" class="btn btn-primary">
                            Update Contact <i class="uil uil-check-circle"></i>
                        </button>
                    </form>
                </div>

            </main>
        </div>
    </section>

    <!-- Modal for adding/editing items -->
    <div id="modal" class="modal">
        <div class="modal-content">
            <h3 id="modal-title" style="margin-bottom: 2rem; font-size: 1.75rem; color: var(--title-color);">Add Item</h3>
            <form id="modal-form">
                <div id="modal-fields"></div>
                <div style="display: flex; gap: 1.5rem; margin-top: 2.5rem;">
                    <button type="submit" class="btn btn-primary" style="flex: 1;">Save Changes</button>
                    <button type="button" class="btn btn-outline" onclick="closeModal()" style="flex: 1;">Cancel</button>
                </div>
            </form>
        </div>
    </div>

    <div id="toast">Changes saved successfully!</div>

    <script src="assets/js/admin.js"></script>
    <!-- Custom Cursor Script -->
    <script>
        const cursorDot = document.querySelector('[data-cursor-dot]');
        const cursorOutline = document.querySelector('[data-cursor-outline]');
        
        window.addEventListener('mousemove', function (e) {
            const posX = e.clientX;
            const posY = e.clientY;
            
            cursorDot.style.left = `${posX}px`;
            cursorDot.style.top = `${posY}px`;
            
            cursorOutline.animate({
                left: `${posX}px`,
                top: `${posY}px`
            }, { duration: 500, fill: "forwards" });
        });

        // Add hover effects
        document.addEventListener('mouseover', (e) => {
            if (e.target.closest('a, button, .sidebar__item, .action-btn')) {
                document.body.classList.add('cursor-hover');
            }
        });
        document.addEventListener('mouseout', (e) => {
            if (e.target.closest('a, button, .sidebar__item, .action-btn')) {
                document.body.classList.remove('cursor-hover');
            }
        });
    </script>
</body>
</html>
